html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: #35212e;
	background-color: #f4cca1;
	overflow: hidden;
	touch-action: none;
}

#canvas { display: block; }
#canvas:focus { outline: none; }

/* ---- Daylight cap palette, light side: cream surface, dark-plum text,
   rounded cap-red progress pill. Type-forward, no sprites — character comes
   from the bouncing wordmark, the rounded candy-striped bar, and the copy. */
#status {
	position: absolute;
	inset: 0;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	gap: 32px;
	visibility: hidden;
	background:
		radial-gradient(ellipse 100% 85% at 50% 40%, #f9dcb6 0%, #f4cca1 62%, #edbd8e 100%);
	font-family: 'BoldPixels', monospace;
	transition: opacity 0.5s ease;
	z-index: 10;
}
#status.fading { opacity: 0; }

/* ---- wordmark hero ---- */
#brand {
	position: relative;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 0 24px;
}
#glow {
	position: absolute;
	inset: -46px -24px;
	background: radial-gradient(ellipse at center,
		rgba(169, 59, 59, 0.16) 0%, rgba(169, 59, 59, 0) 68%);
	animation: glowpulse 2.8s ease-in-out infinite;
	pointer-events: none;
}
#title {
	position: relative;
	font-size: 76px;
	letter-spacing: 4px;
	color: #35212e;
	/* playful cap-red drop shadow gives the wordmark a sticker-like pop */
	text-shadow:
		3px 4px 0 #a93b3b,
		6px 8px 0 rgba(53, 33, 46, 0.22);
	margin: 0;
	line-height: 1;
	user-select: none;
	transform-origin: 50% 100%;
	animation: bounce 2.8s ease-in-out infinite;
}
@keyframes bounce {
	0%, 100% { transform: translateY(0)     scale(1, 1); }
	45%      { transform: translateY(-9px)  scale(1.02, 0.98); }
	60%      { transform: translateY(-9px)  scale(0.99, 1.02); }
}
@keyframes glowpulse {
	0%, 100% { opacity: 0.55; transform: scale(1); }
	50%      { opacity: 0.95; transform: scale(1.07); }
}

#flavor {
	font-size: 21px;
	color: #7a444a;
	text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.35);
	min-height: 25px;
	letter-spacing: 1px;
	user-select: none;
}

/* ---- progress: rounded pill, light track, dark border, red candy fill ---- */
#bar-wrap {
	display: none;
	align-items: center;
	gap: 14px;
}
#bar {
	width: 320px;
	max-width: 66vw;
	height: 26px;
	background: #fbe6cb;
	border: 3px solid #35212e;
	border-radius: 999px;
	box-shadow: 0 4px 0 rgba(53, 33, 46, 0.28);
	padding: 4px;
	box-sizing: content-box;
	overflow: hidden;
}
#bar-fill {
	height: 100%;
	width: 0%;
	border-radius: 999px;
	background:
		linear-gradient(180deg, rgba(255, 255, 255, 0.32) 0%, rgba(255, 255, 255, 0) 46%),
		repeating-linear-gradient(45deg, #bb433c 0 13px, #a93b3b 13px 26px),
		#a93b3b;
	background-size: auto, 37px 37px, auto;
	transition: width 0.22s ease-out;
	animation: stripe 0.9s linear infinite;
}
@keyframes stripe {
	to { background-position: 0 0, 37px 0, 0 0; }
}
#bar.indeterminate #bar-fill {
	width: 34%;
	transition: none;
	animation: stripe 0.9s linear infinite, sweep 1.2s ease-in-out infinite alternate;
}
@keyframes sweep {
	from { margin-left: 0; }
	to   { margin-left: 66%; }
}
#pct {
	font-size: 20px;
	color: #35212e;
	text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.35);
	min-width: 3ch;
	user-select: none;
}

#status-notice {
	display: none;
	background-color: #fbe6cb;
	border: 3px solid #a93b3b;
	border-radius: 16px;
	box-shadow: 0 5px 0 rgba(53, 33, 46, 0.28);
	color: #35212e;
	font-size: 16px;
	line-height: 1.5;
	margin: 0 2rem;
	max-width: 78vw;
	overflow: hidden;
	padding: 1.1rem 1.3rem;
	text-align: center;
}

		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					// Quantize to 8px steps so the fill grows in chunky
					// pixel increments instead of sliding smoothly.
					const frac = Math.min(current / total, 1);
					const steps = 40; // 320px bar / 8px
					barFill.style.width = ((Math.floor(frac * steps) / steps) * 100) + '%';
					pct.textContent = Math.floor(frac * 100) + '%';
					bar.classList.remove('indeterminate');
				} else {
					bar.classList.add('indeterminate');
					pct.textContent = ' ';
				}
			},
		}).then(() => {
			setStatusMode('hidden');
			try { window.MushiesT.track('boot_ok', ''); } catch (e) {}
		}, displayFailureNotice);
	}
}());
	</script>
